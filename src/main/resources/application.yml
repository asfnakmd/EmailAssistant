# ============================================================================
# application.yml — Spring Boot 应用主配置文件
# ============================================================================
# 功能：集中管理所有环境和第三方服务的配置参数。
#
# 编码建议：
#   1. 敏感信息（API Key、密码等）使用环境变量引用: ${OPENAI_API_KEY}
#   2. 多环境配置用 profile 文件区分:
#      - application-dev.yml  (开发环境)
#      - application-prod.yml (生产环境)
#      通过 spring.profiles.active=dev 激活
# ============================================================================

spring:
  application:
    name: email-assistant-java

  # ==================== AI 配置 ====================
  ai:
    # --- DeepSeek (兼容 OpenAI API) ---
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.0

  # ==================== Redis 配置 ====================
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # ==================== 邮件发送配置 ====================
  mail:
    host: smtp.qq.com
    port: 587
    username: ${QQ_EMAIL:3322783302@qq.com}
    password: ${QQ_EMAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

# ==================== 自定义应用配置 ====================
app:
  # 需要人工审批的工具白名单
  approval-required-tools: write_email,schedule_meeting
  # 审批超时时间（分钟）
  approval-timeout-minutes: 30
  # 记忆过期时间（天）
  memory-ttl-days: 30
  # 最大记忆检索条数
  memory-max-results: 5

# ==================== 日志配置 ====================
logging:
  level:
    com.emailassistant: DEBUG
    org.springframework.ai: INFO
    org.springframework.data.redis: WARN
    org.springframework.web.socket: INFO

# ==================== Actuator 监控 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}

# ==================== 服务器配置 ====================
server:
  port: 8686
