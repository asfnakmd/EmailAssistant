# ==================== 自定义应用配置 ====================
# app:
#   # 需要人工审批的工具白名单
#   approval-required-tools:
#     - write_email
#     - schedule_meeting
#   # 审批超时时间（分钟）
#   approval-timeout-minutes: 30
#   # 记忆过期时间（天）
#   memory-ttl-days: 30
#   # 最大记忆检索条数
#   memory-max-results: 5

# ==================== 日志配置 ====================
logging:
  level:
    com.emailassistant: DEBUG
    org.springframework.ai.graph: INFO
    org.springframework.data.redis: WARN

# ==================== Actuator 监控 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

# ==================== 服务器配置 ====================
server:
  port: 8080
