# ============================================================================
# application-template.yml — 配置模板（不含敏感信息）
# 使用方式：复制为 application.yml 并填入实际值
# ============================================================================

spring:
  application:
    name: email-assistant-java

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}           # 替换为你的 DeepSeek API Key
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.0

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  mail:
    host: smtp.qq.com
    port: 587
    username: ${QQ_EMAIL:3322783302@qq.com}  # 替换为你的 QQ 邮箱
    password: ${QQ_EMAIL_PASSWORD}            # 替换为 QQ 邮箱授权码
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
    imap:
      host: imap.qq.com
      port: 993
      protocol: imaps

app:
  approval-required-tools: write_email,schedule_meeting
  approval-timeout-minutes: 30
  memory-ttl-days: 30
  memory-max-results: 5
  auto-process:
    enabled: true
    interval-ms: 300000
    max-emails: 10

logging:
  level:
    com.emailassistant: DEBUG
    org.springframework.ai: INFO
    org.springframework.data.redis: WARN
    org.springframework.web.socket: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: 8686
